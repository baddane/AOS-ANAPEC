<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://login.microsoftonline.com; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>AOS ANAPEC — Intranet</title>
    <script>
      // Safe monkeypatch for window.fetch in restricted iframe sandboxes
      // where some third-party libraries attempt to assign/override window.fetch and trigger type errors.
      try {
        let currentFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get() {
            return currentFetch;
          },
          set(value) {
            currentFetch = value;
          },
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        console.warn("Could not configure fallback setter for window.fetch in index.html:", e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
